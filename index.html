<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Game - Boss Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-board">
        <div class="info-panel">
            <div class="score">Pontos: 0</div>
            <div id="mario-lives">Vidas: ❤️❤️❤️</div>
        </div>
        
        <img src="clouds.png" class="clouds">
        <img src="pipe.png" class="pipe" id="pipeGround">
        <img src="pipe.png" class="pipe-ceiling" id="pipeCeiling">
        
        <div id="platforms-container" style="display: none;">
            <div class="platform" style="left: 20%; bottom: 180px;"></div>
            <div class="platform" style="left: 60%; bottom: 280px;"></div>
        </div>

        <div id="enemies-container"></div>

        <img src="pipe.png" class="boss" id="boss" style="display: none;">
        <div id="boss-health-bar">
            <div id="health-fill"></div>
        </div>

        <div id="bullets-container"></div>
        <img src="mario.gif" class="mario">

        <div class="game-over-screen" id="gameOverScreen">
            <h1>GAME OVER</h1>
            <p id="death-reason"></p>
            <button onclick="restartGame()">RESTART</button>
        </div>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
